# Docling-serve with structure-aware chunking
version: "1"
ingestion_mode: composable

parser:
  type: auto
  docling:
    ocr: false
    ocr_engine: easyocr
    table_structure: false

preprocessors:
  - type: cleaning

chunker:
  type: docling_hybrid
  chunk_size: 1000
  chunk_overlap: 200

embedder:
  provider: openai
  model: text-embedding-3-small

indexer:
  type: opensearch_bulk
  bulk_batch_size: 500

execution:
  backend: redis
  concurrency: 4
