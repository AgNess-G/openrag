# Helm values override for OpenRAG with Ray execution backend.
# Usage: helm install openrag ./charts/openrag -f kubernetes/ray/values-ray.yaml

backend:
  env:
    PIPELINE_EXECUTION_BACKEND: ray
    RAY_ADDRESS: "ray://openrag-ray-head-svc:10001"
    PIPELINE_CONFIG_FILE: config/pipeline.yaml

ray:
  enabled: true
  cluster:
    head:
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
    cpuWorkers:
      replicas: 2
      minReplicas: 1
      maxReplicas: 20
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
    gpuWorkers:
      replicas: 0
      minReplicas: 0
      maxReplicas: 4
      resources:
        requests:
          cpu: "2"
          memory: "8Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"
