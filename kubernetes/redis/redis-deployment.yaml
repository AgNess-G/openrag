---
# Lightweight Redis instance for the pipeline job queue.
# For production, replace with a managed Redis service
# (IBM Databases for Redis, AWS ElastiCache, etc.) and
# remove this Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openrag-redis
  labels:
    app: openrag-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openrag-redis
  template:
    metadata:
      labels:
        app: openrag-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""        # disable RDB persistence — queue is ephemeral
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "384Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: openrag-redis
spec:
  selector:
    app: openrag-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
