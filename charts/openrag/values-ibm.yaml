# =============================================================================
# IBM Cloud Production Overrides
#
# Apply on top of values.yaml:
#   helm upgrade --install openrag charts/openrag \
#     -f charts/openrag/values.yaml \
#     -f charts/openrag/values-ibm.yaml \
#     --set config.ai.openaiApiKey=$OPENAI_API_KEY \
#     ...
# =============================================================================

global:
  # IBM Container Registry namespace prefix.
  # When set, images are resolved as: <imageRegistry>/<repository>:<tag>
  # e.g. us.icr.io/openrag/langflowai/openrag-backend:latest
  # Alternatively, override image.backend.repository etc. directly if your
  # ICR mirrors use short names (e.g. us.icr.io/openrag/openrag-backend).
  imageRegistry: "us.icr.io/openrag"
  imagePullSecrets:
    - name: icr-io-secret

# Uncomment and customise if your ICR mirrors use short image names:
# image:
#   backend:
#     repository: openrag-backend
#     tag: "0.2.0"
#   frontend:
#     repository: openrag-frontend
#     tag: "0.2.0"
#   opensearch:
#     repository: openrag-opensearch
#     tag: "0.2.0"

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend:
  replicaCount: 2

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  autoscaling:
    keda:
      enabled: true
      minReplicas: 2
      maxReplicas: 10

  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  replicaCount: 2

  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# OpenSearch — in-cluster single node (IBM VPC block storage)
# ---------------------------------------------------------------------------
opensearch:
  enabled: true
  replicas: 1
  jvmHeap: "2g"

  storage:
    size: 100Gi
    storageClass: "ibmc-vpc-block-10iops-tier"

  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

# ---------------------------------------------------------------------------
# Redis — disabled; use IBM Databases for Redis
# ---------------------------------------------------------------------------
redis:
  enabled: false

redis_external:
  # Set host/password via --set or existingSecret
  host: ""
  port: 6380
  tls: true

# ---------------------------------------------------------------------------
# Pipeline workers — pin to spot worker pool
# ---------------------------------------------------------------------------
worker:
  maxReplicas: 30
  targetQueueLength: 5

  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  nodeSelector:
    # IBM IKS spot worker pool — adjust pool name to match your cluster
    openrag/pool: pipeline-workers

  tolerations:
    - key: "ibm-cloud.kubernetes.io/worker-pool"
      operator: "Equal"
      value: "pipeline-workers"
      effect: "NoSchedule"

# ---------------------------------------------------------------------------
# Ingress — IBM Cloud VPC Application Load Balancer
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  # IBM VPC ALB ingress class — may be "public-cr<id>-alb" in older IKS
  className: public

  annotations:
    # Cert-manager issues the TLS certificate automatically
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # IBM VPC ALB — expose as internet-facing
    kubernetes.io/ingress.class: "public"
    # Increase timeouts for large document uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"

  # Override in CI / deployment pipeline
  host: openrag.example.com

  tls:
    enabled: true
    secretName: openrag-ibm-tls
    clusterIssuer: letsencrypt-prod

# ---------------------------------------------------------------------------
# Network policies
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true

# ---------------------------------------------------------------------------
# Backend persistence — IBM VPC block storage
# ---------------------------------------------------------------------------
# Applying to backend persistence sub-keys
backend:
  persistence:
    documents:
      storageClass: "ibmc-vpc-block-10iops-tier"
      size: 100Gi
    keys:
      storageClass: "ibmc-vpc-block-10iops-tier"
    config:
      storageClass: "ibmc-vpc-block-10iops-tier"
