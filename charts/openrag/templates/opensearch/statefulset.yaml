{{- if .Values.opensearch.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openrag.fullname" . }}-opensearch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openrag.opensearch.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "openrag.opensearch.serviceName" . }}-headless
  replicas: {{ .Values.opensearch.replicas }}
  selector:
    matchLabels:
      {{- include "openrag.opensearch.selectorLabels" . | nindent 6 }}
  # StatefulSet rolling update — replace one pod at a time
  updateStrategy:
    type: RollingUpdate
  # Retain PVCs on pod delete to avoid data loss during upgrades
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  template:
    metadata:
      labels:
        {{- include "openrag.opensearch.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "openrag.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "openrag.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.opensearch.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # OpenSearch requires vm.max_map_count ≥ 262144
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            privileged: false
          command:
            - /bin/sh
            - -c
            - |
              sysctl -w vm.max_map_count=262144 || true
              chown -R 1000:1000 /usr/share/opensearch/data
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data

      containers:
        - name: opensearch
          image: {{ include "openrag.opensearch.image" . }}
          imagePullPolicy: {{ .Values.image.opensearch.pullPolicy }}
          {{- with .Values.opensearch.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.opensearch.service.httpPort }}
              protocol: TCP
            - name: transport
              containerPort: {{ .Values.opensearch.service.transportPort }}
              protocol: TCP
            - name: perf-analyzer
              containerPort: {{ .Values.opensearch.service.performanceAnalyzerPort }}
              protocol: TCP
          env:
            - name: cluster.name
              value: {{ include "openrag.fullname" . }}-opensearch
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.type
              value: single-node
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms{{ .Values.opensearch.jvmHeap }} -Xmx{{ .Values.opensearch.jvmHeap }}"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "openrag.secretName" . }}
                  key: OPENSEARCH_PASSWORD
            # Disable security plugin for single-node dev (set true for production)
            - name: plugins.security.disabled
              value: "false"
            - name: plugins.security.ssl.http.enabled
              value: "false"
            - name: plugins.security.ssl.transport.enforce_hostname_verification
              value: "false"
            # Memory lock
            - name: bootstrap.memory_lock
              value: "true"
          envFrom:
            - secretRef:
                name: {{ include "openrag.secretName" . }}
          startupProbe:
            httpGet:
              path: /_cluster/health
              port: http
              httpHeaders:
                - name: Authorization
                  value: Basic YWRtaW46YWRtaW4=  # base64(admin:admin) placeholder — overridden by env
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=1s
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.opensearch.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data

      {{- with .Values.opensearch.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.opensearch.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.opensearch.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  # VolumeClaimTemplates are managed by the StatefulSet controller
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "openrag.opensearch.labels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        {{- $sc := coalesce .Values.opensearch.storage.storageClass .Values.global.storageClass }}
        {{- if $sc }}
        storageClassName: {{ $sc }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.opensearch.storage.size }}
{{- end }}
