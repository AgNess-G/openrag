{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openrag.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openrag.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
---
{{- if .Values.serviceAccount.create }}
# ClusterRole is intentionally minimal — read-only access to own namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openrag.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openrag.labels" . | nindent 4 }}
rules:
  # Backend needs to read its own ConfigMap and Secret (health/config reload)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Backend may need to read its own Pod status for health aggregation
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openrag.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openrag.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openrag.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "openrag.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
