{{- if not .Values.backend.existingSecret }}
# Chart-managed secret. In production, prefer supplying existingSecret and
# managing secret values via External Secrets Operator or Vault.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openrag.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openrag.labels" . | nindent 4 }}
  annotations:
    # Helm will not diff secret values in plain text
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # ── OpenSearch ──────────────────────────────────────────────────────────
  OPENSEARCH_USERNAME: {{ .Values.config.opensearch.username | quote }}
  OPENSEARCH_PASSWORD: {{ required "config.opensearch.password is required" .Values.config.opensearch.password | quote }}

  # ── Redis ───────────────────────────────────────────────────────────────
  {{- if or .Values.redis.enabled (and (not .Values.redis.enabled) .Values.config.redis.password) }}
  REDIS_PASSWORD: {{ .Values.config.redis.password | quote }}
  {{- end }}

  # ── AI providers ────────────────────────────────────────────────────────
  OPENAI_API_KEY: {{ .Values.config.ai.openaiApiKey | quote }}
  WATSONX_API_KEY: {{ .Values.config.ai.watsonxApiKey | quote }}
  WATSONX_PROJECT_ID: {{ .Values.config.ai.watsonxProjectId | quote }}
  WATSONX_ENDPOINT: {{ .Values.config.ai.watsonxEndpoint | quote }}

  # ── IBM Cloud Object Storage ─────────────────────────────────────────────
  IBM_COS_HMAC_ACCESS_KEY_ID: {{ .Values.config.cos.hmacAccessKeyId | quote }}
  IBM_COS_HMAC_SECRET_ACCESS_KEY: {{ .Values.config.cos.hmacSecretAccessKey | quote }}
  IBM_COS_ENDPOINT: {{ .Values.config.cos.endpoint | quote }}

  # ── Application secrets ──────────────────────────────────────────────────
  SESSION_SECRET: {{ required "config.app.sessionSecret is required" .Values.config.app.sessionSecret | quote }}
  OPENRAG_ENCRYPTION_KEY: {{ .Values.config.app.encryptionKey | quote }}
{{- end }}
