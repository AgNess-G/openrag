{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openrag.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openrag.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}

  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}

  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # All /api/* requests → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "openrag.backend.serviceName" . }}
                port:
                  number: {{ .Values.backend.service.port }}
          # Root and everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openrag.frontend.serviceName" . }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
