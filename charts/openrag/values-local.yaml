# =============================================================================
# Local Development Overrides (kind / minikube / Docker Desktop)
#
# Apply:
#   helm upgrade --install openrag charts/openrag \
#     -f charts/openrag/values.yaml \
#     -f charts/openrag/values-local.yaml \
#     --set config.ai.openaiApiKey=$OPENAI_API_KEY
#
# Quick-start (kind):
#   kind create cluster
#   kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.15.1/keda-2.15.1.yaml
#   helm dependency update charts/openrag
#   helm upgrade --install openrag charts/openrag -f charts/openrag/values-local.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Backend — smaller footprint
# ---------------------------------------------------------------------------
backend:
  replicaCount: 1

  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

  autoscaling:
    keda:
      enabled: false
    hpa:
      enabled: false

  pdb:
    # Disable PDB in single-replica local mode to allow drain/restart
    enabled: false

  topologySpreadConstraints: []

  persistence:
    documents:
      size: 5Gi
      storageClass: "standard"
    keys:
      size: 256Mi
      storageClass: "standard"
    config:
      size: 256Mi
      storageClass: "standard"

# ---------------------------------------------------------------------------
# Frontend — single replica
# ---------------------------------------------------------------------------
frontend:
  replicaCount: 1

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  pdb:
    enabled: false

  topologySpreadConstraints: []

# ---------------------------------------------------------------------------
# OpenSearch — minimal resources
# ---------------------------------------------------------------------------
opensearch:
  enabled: true
  jvmHeap: "512m"

  storage:
    size: 5Gi
    storageClass: "standard"

  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

# ---------------------------------------------------------------------------
# Redis — run in-cluster for local dev
# ---------------------------------------------------------------------------
redis:
  enabled: true

  auth:
    enabled: true
    # Use a simple password for local dev; override via --set
    password: "localdevredis"

  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  replica:
    replicaCount: 0

# ---------------------------------------------------------------------------
# Worker
# ---------------------------------------------------------------------------
worker:
  maxReplicas: 5
  targetQueueLength: 2

  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# Ingress — disabled locally; use port-forward instead
#   kubectl port-forward svc/openrag-frontend 3000:3000
#   kubectl port-forward svc/openrag-backend  8000:8000
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# NetworkPolicy — disabled locally for easier debugging
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
